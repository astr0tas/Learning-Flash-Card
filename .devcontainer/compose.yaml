services:
  app:
    build:
      context: .
      dockerfile: symfony.Dockerfile
    volumes:
      # Mounts the root of your project into the container's workspace
      - ../:/workspace:cached
    command: sleep infinity
    ports:
      - "8000:8000"

  database:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: lfc
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      # Exposes the DB to your Windows machine on port 5432 so you can use DBeaver/pgAdmin
      - "5432:5432"

volumes:
  pg-data: