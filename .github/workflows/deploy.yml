name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: astr0tas/lfc
  USERNAME: ${{ github.actor }}
  IMAGE_TAG: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=${{ env.IMAGE_TAG }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.symfony
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Download the compose.yml file
        uses: actions/checkout@v4
        with:
          sparse-checkout: compose.yml
          # Cone mode must be false to target a specific individual file
          sparse-checkout-cone-mode: false
      - name: Move the compose.yml file
        run: mv compose.yml /home/nghia/Projects/LFC/compose.yml
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true
      - name: Run the container(s)
        run: |
          # Navigate to the project directory
          cd /home/nghia/Projects/LFC

          # Inject the branch tag variable, pull the fresh image, and recreate the container
          ./start.sh ${{ env.IMAGE_TAG }}

          # Clean up unused dangling images to preserve server disk space
          docker image prune -f
